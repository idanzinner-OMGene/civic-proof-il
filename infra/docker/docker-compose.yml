services:
  postgres:
    image: postgres:16-alpine
    env_file: ../../.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks: [civic]

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: ${NEO4J_USER}/${NEO4J_PASSWORD}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -O /dev/null -q http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    networks: [civic]

  opensearch:
    image: opensearchproject/opensearch:2.18.0
    env_file: ../../.env
    environment:
      discovery.type: single-node
      DISABLE_SECURITY_PLUGIN: "true"
      bootstrap.memory_lock: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: ${OPENSEARCH_PASSWORD}
    ports:
      - "9200:9200"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    networks: [civic]

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    env_file: ../../.env
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 15s
    networks: [civic]

  migrator:
    build:
      context: ../..
      dockerfile: apps/migrator/Dockerfile
    env_file: ../../.env
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      opensearch:
        condition: service_healthy
    restart: "no"
    networks: [civic]

  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    env_file: ../../.env
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      opensearch:
        condition: service_healthy
      minio:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks: [civic]

  worker:
    build:
      context: ../..
      dockerfile: apps/worker/Dockerfile
    env_file: ../../.env
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      opensearch:
        condition: service_healthy
      minio:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/worker_alive && test $(( $(date +%s) - $(stat -c %Y /tmp/worker_alive) )) -lt 60"]
      interval: 15s
      timeout: 5s
      retries: 4
      start_period: 30s
    networks: [civic]

  reviewer_ui:
    build:
      context: ../..
      dockerfile: apps/reviewer_ui/Dockerfile
    environment:
      CIVIC_API_BASE: "http://api:8000"
      REVIEWER_UI_USER: "${REVIEWER_UI_USER:-reviewer}"
      REVIEWER_UI_PASSWORD: "${REVIEWER_UI_PASSWORD}"
    ports:
      - "${REVIEWER_UI_PORT:-8001}:8001"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8001/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s
    networks: [civic]

networks:
  civic:
    driver: bridge

volumes:
  pg_data:
  neo4j_data:
  neo4j_logs:
  opensearch_data:
  minio_data:
