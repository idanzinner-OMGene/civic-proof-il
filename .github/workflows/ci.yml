name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-packages --frozen

      - name: Lint (ruff check)
        run: uv run ruff check .

      - name: Format check (ruff format --check)
        run: uv run ruff format --check .

  test:
    name: Tests (no docker)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-packages --frozen

      - name: Run workspace tests (no docker stack required)
        # Skip integration tests (require compose stack) and docker-gated smoke tests.
        # The remaining suite covers: unit tests for all adapters, packages, services,
        # apps; alignment audit (197 rows); regression tests (5 rows, neo4j-gated ones skip).
        run: |
          uv run pytest \
            --ignore=tests/integration \
            --ignore=tests/smoke/test_services.py \
            --ignore=tests/smoke/test_migrations.py \
            -q

  eval:
    name: Offline eval (benchmark gates)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-packages --frozen

      - name: Run offline eval (gates: min_rows=25, f1_verdict=1.0, f1_claim_typing=1.0)
        run: uv run python scripts/eval.py

      - name: Upload eval report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-report
          path: reports/eval/last_run.json
          retention-days: 30
