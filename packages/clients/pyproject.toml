[project]
name = "civic-clients"
version = "0.0.0"
description = "Shared Postgres, Neo4j, OpenSearch, and MinIO/S3 clients for civic-proof-il."
requires-python = ">=3.12"
dependencies = [
  "psycopg[binary]>=3.1",
  "neo4j>=5.20",
  "opensearch-py>=2.6",
  "minio>=7.2",
  "civic-common",
]

[dependency-groups]
dev = [
  "pytest>=8",
  "pytest-asyncio>=0.23",
]

[tool.uv.sources]
civic-common = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/civic_clients"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
asyncio_mode = "auto"
