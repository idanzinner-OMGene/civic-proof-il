[project]
name = "civic-common"
version = "0.0.0"
description = "Shared utilities, settings, and logging for civic-proof-il."
requires-python = ">=3.12"
dependencies = [
  "pydantic>=2.7",
  "pydantic-settings>=2.2",
]

[dependency-groups]
dev = [
  "pytest>=8",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/civic_common"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
