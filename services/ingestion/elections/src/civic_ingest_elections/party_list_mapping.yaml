# Party / list continuity mapping for Israeli elections.
#
# Maps (knesset_number, ballot_letters) -> knesset_faction_id from KNS_Faction.
# Used to link ElectionResult nodes to the Party nodes already in the graph
# from the positions adapter (keyed uuid5(NS, "knesset_party:{FactionID}")).
#
# Lists that did not enter the Knesset (below threshold) have no faction_id —
# the normalizer generates a uuid5(NS, "cec_list:{knesset}:{letters}") instead.
#
# Sources:
#   KNS_Faction OData (https://knesset.gov.il/Odata/ParliamentInfo.svc/KNS_Faction)
#   CEC K25: https://votes25.bechirot.gov.il/ — election 2022-11-01
#   CEC K24: https://votes24.bechirot.gov.il/ — election 2021-03-23

